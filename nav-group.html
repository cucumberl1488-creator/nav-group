<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N.A.V</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500&display=swap');

  :root{
    --bg-0:#0a0c11;
    --bg-1:#10141c;
    --gold:#c9a227;
    --gold-soft:#e8cf7a;
    --teal:#3fa9a1;
    --ink:#e9e6db;
    --ink-dim:#9aa0ab;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  html,body{
    height:100%;
    background:var(--bg-0);
    overflow-x:hidden;
  }

  body{
    font-family:'Inter', sans-serif;
    color:var(--ink);
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    position:relative;
  }

  /* ambient field */
  .field{
    position:fixed;
    inset:0;
    background:
      radial-gradient(circle at 50% 38%, rgba(63,169,161,0.10), transparent 45%),
      radial-gradient(circle at 50% 50%, rgba(201,162,39,0.07), transparent 60%),
      linear-gradient(180deg, var(--bg-0) 0%, var(--bg-1) 100%);
    z-index:0;
  }

  .stars{
    position:fixed;
    inset:0;
    z-index:0;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(233,230,219,0.5), transparent),
      radial-gradient(1px 1px at 75% 15%, rgba(233,230,219,0.35), transparent),
      radial-gradient(1.5px 1.5px at 60% 70%, rgba(233,230,219,0.4), transparent),
      radial-gradient(1px 1px at 85% 80%, rgba(233,230,219,0.3), transparent),
      radial-gradient(1px 1px at 10% 75%, rgba(233,230,219,0.3), transparent),
      radial-gradient(1.5px 1.5px at 35% 55%, rgba(233,230,219,0.25), transparent),
      radial-gradient(1px 1px at 50% 10%, rgba(233,230,219,0.3), transparent);
    background-repeat:no-repeat;
    opacity:0.8;
  }

  .card{
    position:relative;
    z-index:1;
    width:min(440px, 88vw);
    padding:64px 40px 48px;
    text-align:center;
  }

  /* orbiting ring */
  .orbit{
    position:relative;
    width:120px;
    height:120px;
    margin:0 auto 36px;
  }
  .orbit::before{
    content:'';
    position:absolute;
    inset:0;
    border:1px solid rgba(201,162,39,0.35);
    border-radius:50%;
    animation:spin 22s linear infinite;
  }
  .orbit::after{
    content:'';
    position:absolute;
    inset:18px;
    border:1px solid rgba(63,169,161,0.3);
    border-radius:50%;
    animation:spin 16s linear infinite reverse;
  }
  .orbit .core{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:30px;
    filter: drop-shadow(0 0 14px rgba(201,162,39,0.45));
    animation:pulse 4s ease-in-out infinite;
  }
  .orbit .dot{
    position:absolute;
    width:5px;
    height:5px;
    border-radius:50%;
    background:var(--gold-soft);
    box-shadow:0 0 8px 2px rgba(232,207,122,0.6);
    top:-2.5px;
    left:50%;
    transform-origin:2.5px 62.5px;
    animation:spin 22s linear infinite;
  }

  @keyframes spin{ to{ transform:rotate(360deg); } }
  @keyframes pulse{
    0%,100%{ transform:scale(1); opacity:0.9; }
    50%{ transform:scale(1.08); opacity:1; }
  }

  .eyebrow{
    font-family:'Inter', sans-serif;
    font-size:11px;
    letter-spacing:0.32em;
    text-transform:uppercase;
    color:var(--ink-dim);
    margin-bottom:18px;
  }

  h1{
    font-family:'Cormorant Garamond', serif;
    font-weight:600;
    font-size:clamp(40px, 9vw, 56px);
    letter-spacing:0.06em;
    color:var(--ink);
    line-height:1.1;
  }

  .glyphs{
    margin-top:10px;
    font-size:15px;
    letter-spacing:0.4em;
    color:var(--gold);
    opacity:0.85;
  }

  .rule{
    width:64px;
    height:1px;
    margin:28px auto;
    background:linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  p.tagline{
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-size:18px;
    color:var(--ink-dim);
    line-height:1.6;
    max-width:320px;
    margin:0 auto 38px;
  }

  .cta{
    display:inline-flex;
    align-items:center;
    gap:10px;
    padding:15px 34px;
    font-family:'Inter', sans-serif;
    font-size:13px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    text-decoration:none;
    color:#0a0c11;
    background:linear-gradient(135deg, var(--gold-soft), var(--gold));
    border-radius:2px;
    font-weight:500;
    transition:transform 0.25s ease, box-shadow 0.25s ease;
    box-shadow:0 0 0 0 rgba(201,162,39,0.4);
  }
  .cta:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 24px -4px rgba(201,162,39,0.45);
  }
  .cta:focus-visible{
    outline:2px solid var(--teal);
    outline-offset:4px;
  }
  .cta svg{ width:15px; height:15px; }

  .footnote{
    margin-top:30px;
    font-size:11px;
    letter-spacing:0.08em;
    color:#5d6470;
  }

  @media (prefers-reduced-motion: reduce){
    .orbit::before, .orbit::after, .orbit .core, .orbit .dot{
      animation:none;
    }
  }
</style>
</head>
<body>

  <div class="field"></div>
  <div class="stars"></div>

  <main class="card">
    <div class="orbit">
      <div class="dot"></div>
      <div class="core">💠</div>
    </div>

    <div class="eyebrow">Закрытое сообщество</div>

    <h1>N · A · V</h1>
    <div class="glyphs">🌐 ⚜️ 💠 ⚜️ 🌐</div>

    <div class="rule"></div>

    <p class="tagline">Вход для тех, кто уже знает дорогу.</p>

    <a class="cta" href="https://t.me/+xJ9kElkI6gdlYTMy" target="_blank" rel="noopener">
      Войти в Telegram
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
    </a>

    <div class="footnote">N.A.V — приглашение действительно при переходе по ссылке</div>
  </main>

</body>
</html>
